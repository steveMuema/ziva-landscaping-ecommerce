# CI pipeline for Ziva Landscaping E-Commerce
# Runs on push and PRs to main; lint + build (no DB seed in CI)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure no secrets committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then echo "::error::.env must not be committed. Remove it and rotate any exposed secrets."; exit 1; fi
          for f in .env.local .env.production .env.production.local; do if git ls-files "$f" 2>/dev/null | grep -q .; then echo "::error::$f must not be committed."; exit 1; fi; done
          echo "No env secret files are tracked."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx next build
